# Netlify configuration for Pet Farewell static site

# HTTP to HTTPS redirect
[[redirects]]
  from = "http://*"
  to = "https://:splat.petfarewell.us"
  status = 301
  force = true

[[redirects]]
  from = "http://petfarewell.us/*"
  to = "https://petfarewell.us/:splat"
  status = 301
  force = true

# Cache-control headers for versioned assets
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache-control headers for HTML files
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# 404 routing
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
