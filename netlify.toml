# Netlify configuration for Pet Farewell static site

# Force the canonical non-www HTTPS host.
[[redirects]]
  from = "http://petfarewell.us/*"
  to = "https://petfarewell.us/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.petfarewell.us/*"
  to = "https://petfarewell.us/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.petfarewell.us/*"
  to = "https://petfarewell.us/:splat"
  status = 301
  force = true

# Legacy/alternate SEO path cleanup.
[[redirects]]
  from = "/cities/:city.html"
  to = "/locations/california/:city/"
  status = 301
  force = true

[[redirects]]
  from = "/cities/:city/"
  to = "/locations/california/:city/"
  status = 301
  force = true

[[redirects]]
  from = "/cost.html"
  to = "/at-home-pet-euthanasia/#pricing"
  status = 301
  force = true

[[redirects]]
  from = "/cost/"
  to = "/at-home-pet-euthanasia/#pricing"
  status = 301
  force = true

# Cache-control headers for versioned assets.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache-control headers for HTML files.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Robots and sitemap should be revalidated quickly after SEO updates.
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap-index.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# 404 routing.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404